<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login — Telehealings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; background-color: #f0f2f5; }
    .mobile-app-container { height: 100%; width: 100%; background-color: #ffffff; display: flex; flex-direction: column; position: relative; overflow: hidden; }

    @keyframes slideFadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .login-container { background-color: #ffffff; display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden; }

    /* Header */
    .top-bg-curve { background: linear-gradient(180deg, #cbe0f9 0%, #e2effa 100%); border-radius: 0 0 50% 50% / 0 0 25px 25px; padding: 48px 20px 30px; margin-bottom: 5px; animation: slideFadeUp 0.5s ease-out forwards; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .back-btn { width: 40px; display: flex; justify-content: flex-start; align-items: center; cursor: pointer; color: #335075; z-index: 10; }
    .title { flex: 1; text-align: center; color: #1e5ab8; font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
    .header-heali { width: 40px; display: flex; justify-content: flex-end; }
    .header-heali img { width: 36px; height: auto; }
    .subtitle { color: #4f6885; font-size: 14px; font-weight: 500; text-align: center; line-height: 1.4; margin: 0; padding: 0 10px; }

    /* Form */
    .form-section { flex: 1; padding: 8vh 24px 60px 24px; display: flex; flex-direction: column; background-color: #ffffff; overflow-y: auto; animation: slideFadeUp 0.5s ease-out forwards; }

    .input-group { position: relative; margin-bottom: 24px; }
    .input-label { position: absolute; top: -8px; left: 12px; background: #ffffff; padding: 0 4px; font-size: 12px; font-weight: 400; color: #64748b; z-index: 1; }
    .custom-input { width: 100%; height: 56px; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 16px; font-size: 16px; font-weight: 500; color: #1a293b; outline: none; transition: all 0.3s ease; box-sizing: border-box; font-family: inherit; }
    .custom-input::placeholder { color: #94a3b8; font-weight: 400; }
    .custom-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }

    .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; cursor: pointer; display: flex; }

    .forgot-password { text-align: right; font-size: 13px; font-weight: 600; color: #387bd5; margin-top: -12px; margin-bottom: 32px; cursor: pointer; }

    .btn-primary { width: 100%; background: #387bd5; color: #fff; border: none; border-radius: 25px; height: 50px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; font-family: inherit; margin-bottom: 0; }
    .btn-primary:active { transform: scale(0.97); }

    .divider-text { display: flex; align-items: center; justify-content: center; margin-top: auto; margin-bottom: 30px; color: #94a3b8; font-size: 13px; font-weight: 500; }

    .social-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .btn-social { flex: 1; max-width: 140px; height: 50px; background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 25px; box-shadow: 0 6px 15px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 16px; font-size: 15px; font-weight: 600; color: #1a293b; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; font-family: inherit; }
    .btn-social:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
    .btn-social img { width: 18px; height: 18px; object-fit: contain; }

    .signup-link { text-align: center; font-size: 14px; color: #64748b; font-weight: 500; margin-top: 32px; }
    .signup-link a { color: #387bd5; font-weight: 700; text-decoration: none; }

    /* OTP Section */
    .otp-section { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.4s ease; margin-bottom: 0; }
    .otp-section.active { max-height: 120px; opacity: 1; margin-bottom: 24px; }
    .otp-inputs { display: flex; gap: 12px; justify-content: space-between; margin-bottom: 12px; }
    .otp-box { flex: 1; min-width: 0; height: 52px; background: rgba(59,130,246,0.05); border: 1px solid transparent; border-radius: 12px; text-align: center; font-size: 22px; font-weight: 600; color: #1a293b; outline: none; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s, box-shadow 0.2s; font-family: inherit; }
    .otp-box:focus { background: #ffffff; border-color: #387bd5; transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 16px rgba(59,130,246,0.15); }
    .otp-resend { text-align: center; font-size: 13px; color: #64748b; }
    .otp-resend a { color: #387bd5; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="mobile-app-container login-container">
    <!-- Top Curved Section -->
    <div class="top-bg-curve">
      <div class="header-row">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </div>
        <h1 class="title">Welcome Back</h1>
        <div class="header-heali">
          <img src="../assets/Heali.png" alt="Heali Mascot" onerror="this.style.display='none'">
        </div>
      </div>
      <p class="subtitle">Log in to continue your wellness journey.</p>
    </div>

    <!-- Form Section -->
    <div class="form-section">
      <div class="input-group">
        <label class="input-label">Email or Phone Number</label>
        <input type="text" class="custom-input" id="loginInput" placeholder="Enter your email or phone" autocomplete="username">
      </div>

      <div class="otp-section" id="otpSection">
        <label class="input-label">Enter 6-Digit Code</label>
        <div class="otp-inputs">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric" id="otp1">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric" id="otp2">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric" id="otp3">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric" id="otp4">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric" id="otp5">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric" id="otp6">
        </div>
        <div class="otp-resend" id="otpResend">Didn't receive the code? <a href="#" onclick="resendCode(event)">Resend</a></div>
      </div>

      <button class="btn-primary" id="actionBtn" onclick="handleAuth()">
        <span id="actionBtnText">Send Login Code</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>

      <div class="divider-text">Or continue with</div>

      <div class="social-group">
        <button class="btn-social" onclick="socialLogin('google')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn-social" onclick="socialLogin('apple')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
      </div>

      <div class="signup-link">Don't have an account? <a href="soft-onboarding.html">Sign Up</a></div>
    </div>
  </div>

  <script>
    const actionBtn = document.getElementById('actionBtn');
    const actionBtnText = document.getElementById('actionBtnText');
    const otpSection = document.getElementById('otpSection');
    const otpBoxes = document.querySelectorAll('.otp-box');
    const loginInput = document.getElementById('loginInput');
    let currentState = 'send';
    let countdown = 0;

    function handleAuth() {
      if (currentState === 'send') {
        const val = loginInput.value.trim();
        if (!val) { loginInput.focus(); return; }
        // Simulate sending OTP
        otpSection.classList.add('active');
        actionBtnText.textContent = 'Verify & Login';
        currentState = 'verify';
        setTimeout(() => otpBoxes[0].focus(), 400);
        startResendCountdown();
      } else {
        // Verify OTP
        const code = Array.from(otpBoxes).map(b => b.value).join('');
        if (code.length < 6) { otpBoxes[0].focus(); return; }
        // In production: verify OTP via API
        // For prototype: accept any 6 digits
        localStorage.setItem('verifiedPhone', loginInput.value.trim());
        window.location.href = 'home.html';
      }
    }

    function startResendCountdown() {
      countdown = 30;
      const resendEl = document.getElementById('otpResend');
      resendEl.style.pointerEvents = 'none';
      const interval = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(interval);
          resendEl.innerHTML = 'Didn\'t receive the code? <a href="#" onclick="resendCode(event)">Resend</a>';
          resendEl.style.pointerEvents = 'auto';
        } else {
          resendEl.innerHTML = `Didn't receive the code? Resend in ${countdown}s`;
        }
      }, 1000);
    }

    function resendCode(e) {
      e.preventDefault();
      startResendCountdown();
    }

    function socialLogin(provider) {
      // In production: redirect to OAuth flow
      // For prototype: simulate successful social login
      window.location.href = 'home.html';
    }

    // OTP input handling
    otpBoxes.forEach((box, index) => {
      box.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < otpBoxes.length - 1) {
          otpBoxes[index + 1].focus();
        }
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
          otpBoxes[index - 1].focus();
        }
      });
    });
  </script>
</body>
</html>
