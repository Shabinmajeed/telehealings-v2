<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telehealings — Therapist Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2a73d4;
            --primary-hover: #2361b5;
            --primary-dark: #0745b1;
            --primary-subtitle: #144db9;
            --surface: #ffffff;
            --surface-alt: #e5e4df;
            --text-main: #111111;
            --text-muted: #4b4b4b;
            --text-placeholder: #a8a8a8;
            --border: #999999;
            --border-light: #e8e8e8;
            --danger: #dc2626;
            --radius: 8px;
            --radius-lg: 16px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font); background: #e5e5e5; color: var(--text-main); line-height: 1.5; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        button { font-family: var(--font); cursor: pointer; border: none; outline: none; }
        input { font-family: var(--font); outline: none; }
        img { display: block; }

        .login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            background: linear-gradient(110deg, #ffffff 0%, #eef5fc 35%, #7aaaf6 100%);
        }
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-logo { width: 90px; height: 90px; margin: 0 auto 12px; object-fit: contain; }
        .brand-name { font-size: 42px; font-weight: 700; letter-spacing: -1px; color: var(--primary-dark); margin-bottom: 6px; }
        .brand-tagline { font-size: 14px; font-weight: 500; color: var(--primary-subtitle); margin-bottom: 35px; }
        .page-title { font-size: 26px; font-weight: 700; color: var(--text-muted); text-align: center; margin-bottom: 25px; }

        .login-wrapper { position: relative; width: 100%; max-width: 420px; margin: 0 auto 40px; }
        .mascot { position: absolute; top: -170px; right: -150px; width: 300px; height: auto; z-index: 0; pointer-events: none; }

        .login-card {
            position: relative; background: var(--surface); border-radius: var(--radius-lg);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); z-index: 1;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .card-body { padding: 35px 35px 25px; }

        .input-group { position: relative; margin-bottom: 18px; }
        .input-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; color: #000; pointer-events: none;
        }
        .form-control {
            width: 100%; padding: 16px 48px 16px 48px;
            background-color: var(--border-light); border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 15px; font-family: var(--font);
            color: var(--text-main); transition: border-color 0.2s;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(42, 115, 212, 0.12); }
        .form-control::placeholder { color: var(--text-placeholder); font-weight: 500; }

        .pw-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; padding: 2px; color: var(--text-placeholder);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--text-muted); }
        .pw-toggle svg { width: 20px; height: 20px; }

        .btn-primary {
            width: 100%; padding: 16px; background-color: var(--primary); color: #ffffff;
            border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 10px; margin-bottom: 25px;
            transition: background-color 0.2s;
        }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .links-container { text-align: center; font-size: 13px; font-weight: 600; }

        .card-footer {
            background-color: var(--surface-alt); padding: 22px; text-align: center;
            font-size: 13px; font-weight: 600; color: var(--text-main);
        }
        .card-footer a { color: var(--primary); }

        .error-msg {
            display: none; align-items: center; gap: 8px; padding: 12px 14px;
            background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius);
            font-size: 13px; color: var(--danger); font-weight: 500; margin-bottom: 18px;
        }
        .error-msg.show { display: flex; }
        .error-msg svg { width: 18px; height: 18px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="login-page">
    <div class="brand-header">
        <img src="../assets/logo.png" alt="Telehealings Logo" class="brand-logo">
        <h1 class="brand-name">Telehealings</h1>
        <p class="brand-tagline">Continuity-First Wellness Care Platform</p>
        <h2 class="page-title">Therapist Login</h2>
    </div>

    <div class="login-wrapper">
        <img src="../assets/Heali-peak.png" alt="Heali Mascot" class="mascot">

        <div class="login-card">
            <div class="card-body">
                <div class="error-msg" id="errorMsg">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v4M12 16h.01"/>
                    </svg>
                    <span id="errorText">Invalid email or password. Please try again.</span>
                </div>

                <form id="loginForm" novalidate>
                    <div class="input-group">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="email" class="form-control" id="email" placeholder="Email Address" autocomplete="email" required>
                    </div>

                    <div class="input-group">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect width="14" height="10" x="5" y="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                            <circle cx="12" cy="16" r="1"/>
                        </svg>
                        <input type="password" class="form-control" id="password" placeholder="Password" autocomplete="current-password" required>
                        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
                            <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeOffIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                                <path d="M14.12 14.12a3 3 0 11-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>

                    <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
                </form>

                <div class="links-container">
                    <a href="#">Forgot Password?</a>
                </div>
            </div>
            <div class="card-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>
</div>

<script>
    const pwInput = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');

    pwToggle.addEventListener('click', () => {
        const isPassword = pwInput.type === 'password';
        pwInput.type = isPassword ? 'text' : 'password';
        eyeIcon.style.display = isPassword ? 'none' : 'block';
        eyeOffIcon.style.display = isPassword ? 'block' : 'none';
        pwInput.focus();
    });

    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        errorMsg.classList.remove('show');

        const email = document.getElementById('email').value.trim();
        const password = pwInput.value.trim();

        if (!email) { showError('Please enter your email address.'); document.getElementById('email').focus(); return; }
        if (!email.includes('@')) { showError('Please enter a valid email address.'); document.getElementById('email').focus(); return; }
        if (!password) { showError('Please enter your password.'); pwInput.focus(); return; }

        const originalText = loginBtn.textContent;
        loginBtn.textContent = 'Logging in...';
        loginBtn.disabled = true;
        loginBtn.style.opacity = '0.7';

        setTimeout(() => {
            loginBtn.textContent = originalText;
            loginBtn.disabled = false;
            loginBtn.style.opacity = '1';
            window.location.href = 'dashboard.html';
        }, 1200);
    });

    function showError(msg) { errorText.textContent = msg; errorMsg.classList.add('show'); }

    document.getElementById('email').addEventListener('input', () => errorMsg.classList.remove('show'));
    pwInput.addEventListener('input', () => errorMsg.classList.remove('show'));
</script>
</body>
</html>
