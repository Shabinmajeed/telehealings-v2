<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profile Success — Telehealings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #f0f2f5; }
    .mobile-app-container { height: 100%; width: 100%; background: #fff; display: flex; flex-direction: column; overflow: hidden; }
    @keyframes slideFadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 40% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100px) rotate(720deg); opacity: 0; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .content-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px 24px; text-align: center; position: relative; overflow: hidden; }
    .confetti-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
    .confetti { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall 2s ease-out forwards; }
    .icon-wrapper { width: 100px; height: 100px; background: #f0fdfa; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 32px; color: #0d9488; box-shadow: 0 12px 35px rgba(13, 148, 136, 0.15); animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulse 2s ease-in-out 0.8s 3; }
    .title { font-size: 28px; font-weight: 800; color: #335075; margin: 0 0 16px; letter-spacing: -0.5px; animation: slideFadeUp 0.5s ease-out 0.2s forwards; opacity: 0; }
    .subtitle { font-size: 15px; font-weight: 500; color: #637b96; line-height: 1.6; margin: 0; animation: slideFadeUp 0.5s ease-out 0.3s forwards; opacity: 0; }
    .secure-badge { display: inline-flex; align-items: center; gap: 6px; background: #f8fafc; padding: 8px 16px; border-radius: 20px; border: 1px solid #e2e8f0; color: #64748b; font-size: 13px; font-weight: 600; margin-top: 24px; animation: slideFadeUp 0.5s ease-out 0.4s forwards; opacity: 0; }
    .bottom-actions { padding: 24px; display: flex; flex-direction: column; gap: 16px; animation: slideFadeUp 0.5s ease-out 0.5s forwards; opacity: 0; }
    .btn-primary { width: 100%; background: linear-gradient(135deg, #387bd5 0%, #1e5ab8 100%); color: #fff; border: none; border-radius: 25px; padding: 16px 24px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; font-family: inherit; box-shadow: 0 8px 20px rgba(56, 123, 213, 0.25); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-secondary { width: 100%; padding: 16px 24px; border-radius: 30px; border: 2px solid #e2e8f0; background: #fff; color: #475569; font-size: 17px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: inherit; }
    .btn-secondary:active { background: #f8fafc; transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="mobile-app-container">
    <div class="content-section">
      <div class="confetti-container" id="confettiContainer"></div>
      <div class="icon-wrapper"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg></div>
      <h1 class="title">Profile Updated Successfully!</h1>
      <p class="subtitle">Your personal details have been saved securely. We value your privacy and guarantee that your information will never be shared with third parties.</p>
      <div class="secure-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg><span>End-to-End Encrypted</span></div>
    </div>
    <div class="bottom-actions">
      <button class="btn-primary" onclick="window.location.href='medical-profile-1.html'">Complete Medical Profile <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></button>
      <button class="btn-secondary" onclick="window.location.href='home.html'">Go to Home</button>
    </div>
  </div>
  <script>
    // Confetti celebration
    const container = document.getElementById('confettiContainer');
    const colors = ['#387bd5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
    for (let i = 0; i < 30; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-20px';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDelay = Math.random() * 0.5 + 's';
      confetti.style.animationDuration = (1.5 + Math.random() * 1) + 's';
      confetti.style.width = (6 + Math.random() * 8) + 'px';
      confetti.style.height = (6 + Math.random() * 8) + 'px';
      container.appendChild(confetti);
    }
  </script>
</body>
</html>
