<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Phone Verify — Telehealings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; background-color: #f0f2f5; }
    .mobile-app-container { height: 100%; width: 100%; background-color: #ffffff; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    @keyframes slideFadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .verify-container { background-color: #ffffff; display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden; }

    /* Header */
    .top-section { background: linear-gradient(180deg, #e7f2ff 0%, #2366bd 100%); border-radius: 0 0 50% 50% / 0 0 35px 35px; padding: 48px 20px 24px; flex-shrink: 0; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .back-btn { width: 40px; display: flex; justify-content: flex-start; align-items: center; cursor: pointer; color: #ffffff; z-index: 10; }
    .header-title { flex: 1; text-align: center; color: #ffffff; font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
    .header-heali { width: 40px; display: flex; justify-content: flex-end; }
    .header-heali img { width: 36px; height: auto; }
    .header-subtitle { color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 600; text-align: center; line-height: 1.4; margin: 0; padding: 0 10px; }

    /* Form */
    .form-section { flex: 1; padding: 24px 24px 32px 24px; display: flex; flex-direction: column; z-index: 2; background-color: #ffffff; overflow-y: auto; animation: slideFadeUp 0.5s ease-out forwards; }
    .input-label { font-size: 14px; font-weight: 700; color: #000000; margin-bottom: 12px; display: block; }

    .phone-input-group { display: flex; gap: 12px; margin-bottom: 32px; }
    .country-select { position: relative; width: 96px; height: 48px; border: 1px solid rgba(0,0,0,0.12); border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; background: #f8fafc; cursor: pointer; flex-shrink: 0; transition: all 0.3s ease; }
    .country-select:focus-within { background: #ffffff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
    .country-code { font-size: 16px; font-weight: 500; color: #1a293b; pointer-events: none; }
    .hidden-country-select { position: absolute; inset: 0; opacity: 0; cursor: pointer; -webkit-appearance: none; appearance: none; }

    .phone-input { flex: 1; width: 100%; height: 48px; border: 1px solid rgba(0,0,0,0.12); border-radius: 16px; padding: 0 16px; font-size: 18px; font-weight: 500; color: #1a293b; background: #f8fafc; outline: none; transition: all 0.3s ease; font-family: inherit; }
    .phone-input::placeholder { color: #637b96; font-weight: 400; }
    .phone-input:focus { background: #ffffff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }

    /* OTP */
    .otp-section { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.4s ease, margin-bottom 0.4s ease; }
    .otp-section.active { max-height: 100px; opacity: 1; margin-bottom: 24px; }
    .otp-inputs { display: flex; gap: 12px; justify-content: space-between; }
    .otp-box { flex: 1; min-width: 0; height: 52px; background: rgba(59,130,246,0.05); border: 1px solid transparent; border-radius: 12px; text-align: center; font-size: 22px; font-weight: 600; color: #1a293b; outline: none; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s, box-shadow 0.2s; font-family: inherit; }
    .otp-box:focus { background: #ffffff; border-color: #387bd5; transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 16px rgba(59,130,246,0.15); }

    .btn-primary { width: 100%; background: #387bd5; color: #fff; border: none; border-radius: 25px; height: 50px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; font-family: inherit; margin-bottom: 24px; box-shadow: 0 8px 20px rgba(56, 123, 213, 0.25); }
    .btn-primary:active { transform: scale(0.97); }

    .social-group { display: flex; justify-content: center; gap: 20px; margin-top: auto; margin-bottom: 40px; }
    .btn-social { flex: 1; max-width: 140px; height: 50px; background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 25px; box-shadow: 0 6px 15px rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 16px; font-size: 15px; font-weight: 600; color: #1a293b; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; font-family: inherit; }
    .btn-social:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }

    .support-text { text-align: center; font-size: 13px; color: #64748b; font-weight: 500; padding-bottom: 24px; }
    .support-link { color: #000000; font-weight: 700; text-decoration: underline; cursor: pointer; }

    /* Verify Method Toggle */
    .verify-method-toggle { display: flex; gap: 10px; margin-bottom: 8px; }
    .method-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1px solid rgba(0,0,0,0.12); border-radius: 16px; background: #f8fafc; font-size: 14px; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.2s ease; }
    .method-btn.active { background: #ffffff; border-color: #3b82f6; color: #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,0.1); }
    .method-btn svg { width: 18px; height: 18px; }

    /* OTP Resend */
    .otp-resend { text-align: center; font-size: 13px; color: #64748b; margin-top: 12px; }
    .otp-resend a { color: #387bd5; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="mobile-app-container verify-container">
    <div class="top-section">
      <div class="header-row">
        <div class="back-btn" onclick="window.history.back()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </div>
        <h1 class="header-title">Verification</h1>
        <div class="header-heali">
          <img src="../assets/Heali.png" alt="Heali Mascot" onerror="this.style.display='none'">
        </div>
      </div>
      <p class="header-subtitle">We will send you a one-time password to verify your account.</p>
    </div>
    <!-- Form -->
    <div class="form-section">
      <div class="input-label">Select Verification Method</div>
      <div class="verify-method-toggle">
        <button class="method-btn active" id="methodPhone" onclick="switchMethod('phone')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          Phone
        </button>
        <button class="method-btn" id="methodEmail" onclick="switchMethod('email')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          Email
        </button>
      </div>

      <!-- Phone Input -->
      <div id="phoneInputGroup">
        <label class="input-label" style="margin-top: 20px;">Phone Number</label>
        <div class="phone-input-group">
          <div class="country-select" tabindex="0">
            <span class="country-code" id="countryCodeDisplay">🇮🇳 +91</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="pointer-events: none; color: #64748b;"><polyline points="6 9 12 15 18 9"></polyline></svg>
            <select class="hidden-country-select" id="countrySelect">
              <option value="+91">🇮🇳 +91 (IN)</option>
              <option value="+1">🇺🇸 +1 (US)</option>
              <option value="+44">🇬🇧 +44 (UK)</option>
              <option value="+61">🇦🇺 +61 (AU)</option>
              <option value="+1">🇨🇦 +1 (CA)</option>
            </select>
          </div>
          <input type="tel" class="phone-input" id="phoneInput" placeholder="000 000 0000" maxlength="12">
        </div>
      </div>

      <!-- Email Input (hidden by default) -->
      <div id="emailInputGroup" style="display: none; margin-top: 20px;">
        <label class="input-label">Email Address</label>
        <input type="email" class="phone-input" id="emailInput" placeholder="Enter your email address" style="width: 100%;">
      </div>

      <!-- OTP Section -->
      <div class="otp-section" id="otpSection">
        <label class="input-label" style="margin-top: 20px;">Enter 6-Digit Code</label>
        <div class="otp-inputs">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
        </div>
        <div class="otp-resend" id="otpResend">Didn't receive the code? <a href="#" onclick="resendCode(event)">Resend</a></div>
      </div>

      <button class="btn-primary" id="actionBtn" onclick="handleVerify()">
        <span id="actionBtnText">Send Code</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>

      <div class="support-text">Having trouble? <span class="support-link">Contact Support</span></div>
    </div>
  </div>

  <script>
    const actionBtn = document.getElementById('actionBtn');
    const actionBtnText = document.getElementById('actionBtnText');
    const otpSection = document.getElementById('otpSection');
    const otpBoxes = document.querySelectorAll('.otp-box');
    const phoneInput = document.getElementById('phoneInput');
    const emailInput = document.getElementById('emailInput');
    const countrySelect = document.getElementById('countrySelect');
    const countryCodeDisplay = document.getElementById('countryCodeDisplay');
    let currentState = 'send';
    let currentMethod = 'phone';
    let countdown = 0;

    function switchMethod(method) {
      currentMethod = method;
      document.getElementById('methodPhone').classList.toggle('active', method === 'phone');
      document.getElementById('methodEmail').classList.toggle('active', method === 'email');
      document.getElementById('phoneInputGroup').style.display = method === 'phone' ? 'block' : 'none';
      document.getElementById('emailInputGroup').style.display = method === 'email' ? 'block' : 'none';
    }

    if (countrySelect && countryCodeDisplay) {
      countrySelect.addEventListener('change', function() {
        const selectedText = this.options[this.selectedIndex].text;
        const match = selectedText.match(/(.*? \+\d+)/);
        countryCodeDisplay.textContent = match ? match[1] : this.value;
      });
    }

    phoneInput.addEventListener('input', function (e) {
      let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
      e.target.value = !x[2] ? x[1] : x[1] + ' ' + x[2] + (x[3] ? ' ' + x[3] : '');
    });

    function handleVerify() {
      if (currentState === 'send') {
        const val = currentMethod === 'phone' ? phoneInput.value.trim() : emailInput.value.trim();
        if (!val) { (currentMethod === 'phone' ? phoneInput : emailInput).focus(); return; }
        otpSection.classList.add('active');
        actionBtnText.textContent = 'Verify';
        currentState = 'verify';
        setTimeout(() => otpBoxes[0].focus(), 400);
        startResendCountdown();
      } else {
        const code = Array.from(otpBoxes).map(b => b.value).join('');
        if (code.length < 6) { otpBoxes[0].focus(); return; }
        // In production: verify OTP via API, check if user exists
        // For prototype: check if user has already completed profile
        const hasProfile = localStorage.getItem('profileData');
        if (currentMethod === 'phone') {
          localStorage.setItem('verifiedPhone', phoneInput.value.trim());
        } else {
          localStorage.setItem('verifiedEmail', emailInput.value.trim());
        }
        window.location.href = hasProfile ? 'home.html' : 'profile-completion.html';
      }
    }

    function startResendCountdown() {
      countdown = 30;
      const resendEl = document.getElementById('otpResend');
      resendEl.style.pointerEvents = 'none';
      const interval = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(interval);
          resendEl.innerHTML = 'Didn\'t receive the code? <a href="#" onclick="resendCode(event)">Resend</a>';
          resendEl.style.pointerEvents = 'auto';
        } else {
          resendEl.innerHTML = `Didn't receive the code? Resend in ${countdown}s`;
        }
      }, 1000);
    }

    function resendCode(e) {
      e.preventDefault();
      startResendCountdown();
    }

    otpBoxes.forEach((box, index) => {
      box.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < otpBoxes.length - 1) otpBoxes[index + 1].focus();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value === '' && index > 0) otpBoxes[index - 1].focus();
      });
    });
  </script>
</body>
</html>
