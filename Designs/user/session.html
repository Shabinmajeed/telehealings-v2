<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Session — Telehealings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #1e293b; display: flex; justify-content: center; align-items: center; }
    .mobile-app-container { height: 100%; width: 100%; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .session-container { background-color: #1e293b; display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden; }
    @keyframes slideFadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseDot { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
    .remote-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    .top-bar { position: absolute; top: 0; left: 0; right: 0; padding: 40px 24px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%); }
    .therapist-info { display: flex; align-items: center; gap: 12px; }
    .therapist-name { color: #fff; font-size: 16px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .session-timer { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 20px; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1); }
    .session-timer::before { content: ''; width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulseDot 2s infinite; }
    .local-video-container { position: absolute; top: 100px; right: 20px; width: 100px; height: 140px; border-radius: 16px; overflow: hidden; z-index: 10; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.2); transition: background 0.2s; }
    .local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: opacity 0.2s; }
    .controls-bar { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 24px 40px; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 10; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%); }
    .control-btn { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; color: #fff; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; transition: all 0.2s; }
    .control-btn.off { background: #f8fafc; color: #1e293b; }
    .control-btn.end-call { background: #ef4444; border-color: #ef4444; }
    .control-btn:active { transform: scale(0.92); }
    .control-btn svg { width: 24px; height: 24px; }
    .session-chat-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 120px; z-index: 20; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }
    .session-chat-panel { background: #fff; height: 60vh; border-radius: 24px; margin: 0 16px; display: flex; flex-direction: column; transform: translateY(120%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.25); }
    .session-chat-overlay.open .session-chat-panel { transform: translateY(0); }
    .chat-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
    .chat-header-title { font-size: 16px; font-weight: 700; color: #1a293b; }
    .chat-close-btn { color: #64748b; cursor: pointer; display: flex; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: #f8fafc; }
    .chat-messages::-webkit-scrollbar { display: none; }
    .msg-bubble-wrap { display: flex; flex-direction: column; max-width: 85%; animation: slideFadeUp 0.3s ease-out forwards; }
    .msg-bubble-wrap.remote { align-self: flex-start; }
    .msg-bubble-wrap.local { align-self: flex-end; align-items: flex-end; }
    .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .msg-bubble-wrap.remote .msg-bubble { background: #fff; color: #334155; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }
    .msg-bubble-wrap.local .msg-bubble { background: #387bd5; color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 11px; color: #94a3b8; margin-top: 6px; padding: 0 4px; font-weight: 500; }
    .chat-input-area { padding: 16px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; gap: 12px; align-items: flex-end; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
    .chat-input { flex: 1; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 20px; padding: 12px 16px; font-size: 14px; outline: none; resize: none; min-height: 44px; max-height: 100px; font-family: inherit; color: #1a293b; }
    .chat-input:focus { border-color: #387bd5; background: #fff; }
    .chat-send-btn { width: 44px; height: 44px; border-radius: 50%; background: #387bd5; color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.2s; }
    .chat-send-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="mobile-app-container session-container">
    <img src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?auto=format&fit=crop&w=800&q=80" alt="Therapist Video" class="remote-video">
    <div class="top-bar">
      <div class="therapist-info"><span class="therapist-name">Dr. John .D</span></div>
      <div class="session-timer" id="sessionTimer">45:00</div>
    </div>
    <div class="local-video-container">
      <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=400&q=80" alt="Local Video" class="local-video" id="localVideo">
    </div>
    <div class="session-chat-overlay" id="sessionChatOverlay">
      <div class="session-chat-panel" onclick="event.stopPropagation()">
        <div class="chat-header">
          <div class="chat-header-title">Chat with Dr. John</div>
          <div class="chat-close-btn" id="closeChatBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="msg-bubble-wrap remote"><div class="msg-bubble">Hi Ajesh! I'm here. Let me know when you're ready to start.</div><div class="msg-time">Just now</div></div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
          <button class="chat-send-btn" id="sendChatBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
        </div>
      </div>
    </div>
    <div class="controls-bar">
      <button class="control-btn" id="micToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg></button>
      <button class="control-btn" id="camToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg></button>
      <button class="control-btn" id="chatToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></button>
      <button class="control-btn end-call" onclick="window.location.href='session-feedback.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg></button>
    </div>
  </div>
  <script>
    let timeLeft = 45 * 60;
    const timerDisplay = document.getElementById('sessionTimer');
    setInterval(() => { if(timeLeft>0){timeLeft--;const m=Math.floor(timeLeft/60);const s=timeLeft%60;timerDisplay.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;} },1000);
    const micToggle=document.getElementById('micToggle'),camToggle=document.getElementById('camToggle'),localVideo=document.getElementById('localVideo');
    micToggle.addEventListener('click',function(){this.classList.toggle('off');});
    camToggle.addEventListener('click',function(){this.classList.toggle('off');localVideo.style.opacity=this.classList.contains('off')?'0':'1';localVideo.parentElement.style.background=this.classList.contains('off')?'#334155':'transparent';});

    // Check session type from stored booking
    const sessionBooking = localStorage.getItem('lastBooking');
    if (sessionBooking) {
      try {
        const booking = JSON.parse(sessionBooking);
        if (booking.sessionType === 'audio') {
          // Audio session: camera off, toggle disabled
          camToggle.classList.add('off');
          localVideo.style.opacity = '0';
          localVideo.parentElement.style.background = '#334155';
          camToggle.style.opacity = '0.5';
          camToggle.style.pointerEvents = 'none';
        }
      } catch(e) {}
    }

    // Persist chat messages
    const chatInput=document.getElementById('chatInput'),sendChatBtn=document.getElementById('sendChatBtn'),chatMessages=document.getElementById('chatMessages');
    function sendSessionMessage(){
      const t=chatInput.value.trim();
      if(!t)return;
      const msgData={text:t,sentAt:new Date().toISOString(),sender:'user'};
      const storedMessages=JSON.parse(localStorage.getItem('sessionChat')||'[]');
      storedMessages.push(msgData);
      localStorage.setItem('sessionChat',JSON.stringify(storedMessages));
      chatMessages.insertAdjacentHTML('beforeend','<div class="msg-bubble-wrap local"><div class="msg-bubble">'+t.replace(/</g,"&lt;")+'</div><div class="msg-time">Just now</div></div>');
      chatInput.value='';chatInput.style.height='44px';
      chatMessages.scrollTop=chatMessages.scrollHeight;
    }
    const chatToggleBtn=document.getElementById('chatToggle'),sessionChatOverlay=document.getElementById('sessionChatOverlay'),closeChatBtn=document.getElementById('closeChatBtn');
    chatToggleBtn.addEventListener('click',function(){sessionChatOverlay.classList.toggle('open');this.classList.toggle('off');});
    closeChatBtn.addEventListener('click',()=>{sessionChatOverlay.classList.remove('open');chatToggleBtn.classList.remove('off');});
    const chatInput=document.getElementById('chatInput'),sendChatBtn=document.getElementById('sendChatBtn'),chatMessages=document.getElementById('chatMessages');
    function sendSessionMessage(){const t=chatInput.value.trim();if(!t)return;chatMessages.insertAdjacentHTML('beforeend',`<div class="msg-bubble-wrap local"><div class="msg-bubble">${t.replace(/</g,"&lt;")}</div><div class="msg-time">Just now</div></div>`);chatInput.value='';chatInput.style.height='44px';chatMessages.scrollTop=chatMessages.scrollHeight;}
    sendChatBtn.addEventListener('click',sendSessionMessage);
    chatInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendSessionMessage();}});
    chatInput.addEventListener('input',function(){this.style.height='auto';this.style.height=this.scrollHeight+'px';if(this.value==='')this.style.height='44px';});
  </script>
</body>
</html>
