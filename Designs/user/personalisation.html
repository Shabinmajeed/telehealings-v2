<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Telehealings — Personalisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f2f5;
    }

    /* Mobile App Container */
    .mobile-app-container {
      height: 100%;
      width: 100%;
      background-color: #ffffff;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Animations */
    @keyframes slideFadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-4px); }
    }

    /* Screen Container */
    .personalisation-container {
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top Curved Background Section */
    .top-bg-curve {
      background: linear-gradient(180deg, #cbe0f9 0%, #e2effa 100%);
      border-radius: 0 0 50% 50% / 0 0 25px 25px;
      padding: 25px 20px 30px;
      margin-bottom: 5px;
      animation: slideFadeUp 0.5s ease-out forwards;
    }

    /* Header */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .back-btn, .mascot {
      width: 40px;
      display: flex;
    }

    .back-btn {
      justify-content: flex-start;
      align-items: center;
      cursor: pointer;
      color: #384e68;
    }

    .mascot {
      justify-content: flex-end;
      align-items: center;
    }

    .mascot img {
      width: 34px;
      height: auto;
      object-fit: contain;
    }

    .title {
      flex: 1;
      text-align: center;
      color: #1e5ab8;
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #4f6885;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      line-height: 1.4;
      margin: 0;
      padding: 0 10px;
    }

    /* Main Content Area */
    .content-section {
      padding: 5px 20px 15px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    /* Options Grid */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      opacity: 0;
      animation: slideFadeUp 0.5s ease-out 0.3s forwards;
    }

    .option-card {
      background: #ffffff;
      border: 1.5px solid transparent;
      border-radius: 20px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .option-card:active {
      transform: scale(0.96);
    }

    .icon-box {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .icon-box svg {
      width: 100%;
      height: 100%;
      color: #1e5ab8;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .option-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a293b;
      margin-bottom: 4px;
      transition: color 0.3s ease;
    }

    .option-subtitle {
      font-size: 11px;
      color: #64748b;
      line-height: 1.2;
      transition: color 0.3s ease;
    }

    /* Selected State */
    .option-card.selected {
      background: rgba(59, 130, 246, 0.06);
      border-color: #387bd5;
      box-shadow: 0 4px 12px rgba(56, 123, 213, 0.1);
    }

    .option-card.selected .icon-box svg {
      transform: scale(1.1);
      color: #387bd5;
    }

    .option-card.selected .option-title {
      color: #1e5ab8;
    }

    .option-card.selected .option-subtitle {
      color: #385b8a;
    }

    /* Bottom Section */
    .bottom-section {
      padding: 15px 20px 25px 20px;
      background-color: #ffffff;
      opacity: 0;
      animation: slideFadeUp 0.5s ease-out 0.4s forwards;
    }

    /* Selection Info Text */
    .selection-info {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 16px;
      font-weight: 400;
      font-style: italic;
      opacity: 0.8;
      transition: color 0.2s ease;
    }

    .selection-info.error {
      color: #d93838;
      animation: shake 0.4s ease-in-out;
    }

    /* Primary Button */
    .btn-primary {
      background: #387bd5;
      color: #ffffff;
      margin: 0 auto;
      width: 80%;
      height: 56px;
      border-radius: 30px;
      border: none;
      font-size: 17px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.18);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.18s ease;
      font-family: inherit;
    }

    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(59, 130, 246, 0.12);
    }

    .btn-primary:disabled {
      background: #c8d9ed;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="mobile-app-container personalisation-container">
    <!-- Top Curved Section (Header + Subtitle) -->
    <div class="top-bg-curve">
      <div class="header-row">
        <div class="back-btn" onclick="window.location.href='soft-onboarding.html'">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </div>
        <h1 class="title">What brings you here?</h1>
        <div class="mascot">
          <img src="../assets/Heali.png" alt="Heali Mascot" onerror="this.style.display='none'">
        </div>
      </div>
      <p class="subtitle">Choose what you'd like to focus on first. We'll personalize your journey based on your needs.</p>
    </div>

    <!-- Main Content -->
    <div class="content-section">
      <div class="options-grid" id="options-container">
        <!-- Options generated via JavaScript -->
      </div>
    </div>

    <!-- Bottom Button -->
    <div class="bottom-section">
      <div id="selection-info" class="selection-info">Select at least 1 option to continue</div>
      <button class="btn-primary" id="continue-btn" disabled>
        Continue
      </button>
    </div>
  </div>

  <script>
    const options = [
      {
        id: 'stress',
        title: 'Stress',
        subtitle: 'Managing daily pressure',
        icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 18a4.5 4.5 0 0 0 .76-8.93 7 7 0 0 0-13.33-1.6A4.5 4.5 0 0 0 6 18h4v-3H8l4-6v4h2l-4 6h3z"/></svg>'
      },
      {
        id: 'anxiety',
        title: 'Anxiety',
        subtitle: 'Calming your mind',
        icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35zM9 13l2-4 1.5 3H16v-2h-2.5l-1.5-3-2 4-1.5-3H5v2h2.5L9 13z"/></svg>'
      },
      {
        id: 'sleep',
        title: 'Sleep',
        subtitle: 'Better rest',
        icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.1 2.3a.7.7 0 0 0-1.1-.3C7 5 4.6 9 4.8 13.5A9.5 9.5 0 0 0 14.2 23c4.4.2 8.4-2.1 10.9-6 .2-.3 0-.8-.4-1-.8-.4-1.7-.5-2.6-.5-5.3 0-9.6-4.3-9.6-9.6 0-1.3.3-2.6.8-3.7.1-.4 0-.7-.2-.9z"/></svg>'
      },
      {
        id: 'relationships',
        title: 'Relationships',
        subtitle: 'Building connections',
        icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>'
      },
      {
        id: 'self-esteem',
        title: 'Self-esteem',
        subtitle: 'Building confidence',
        icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 3C22 3 19 3 15 6C11 9 11 14 11 14V21H13V15C13 15 14 13 16 13C20 13 22 9 22 3ZM2 7C2 7 5 7 9 10C13 13 13 18 13 18V21H11V19C11 19 10 17 8 17C4 17 2 13 2 7Z"/></svg>'
      },
      {
        id: 'focus',
        title: 'Focus',
        subtitle: 'Improving concentration',
        icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>'
      }
    ];

    const optionsContainer = document.getElementById('options-container');

    options.forEach(option => {
      const card = document.createElement('div');
      card.className = 'option-card';
      card.dataset.id = option.id;
      card.setAttribute('role', 'checkbox');
      card.setAttribute('aria-checked', 'false');
      card.setAttribute('tabindex', '0');

      card.innerHTML = `
        <div class="icon-box">${option.icon}</div>
        <div class="option-title">${option.title}</div>
        <div class="option-subtitle">${option.subtitle}</div>
      `;

      card.addEventListener('click', function() {
        const currentlySelected = document.querySelectorAll('.option-card.selected').length;
        const isAlreadySelected = this.classList.contains('selected');

        if (!isAlreadySelected && currentlySelected >= 3) {
          const infoEl = document.getElementById('selection-info');
          infoEl.textContent = 'You can only choose a maximum of 3 cards.';
          infoEl.classList.remove('error');
          void infoEl.offsetWidth;
          infoEl.classList.add('error');
          return;
        }

        const isSelected = this.classList.toggle('selected');
        this.setAttribute('aria-checked', isSelected);
        validateSelection();
      });

      card.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.click();
        }
      });

      optionsContainer.appendChild(card);
    });

    const continueBtn = document.getElementById('continue-btn');

    function validateSelection() {
      const infoEl = document.getElementById('selection-info');
      const selectedCards = document.querySelectorAll('.option-card.selected');
      const count = selectedCards.length;

      continueBtn.disabled = count === 0;
      infoEl.classList.remove('error');

      if (count === 0) {
        infoEl.textContent = 'Select at least 1 option to continue';
      } else {
        infoEl.innerHTML = '&nbsp;';
      }
    }

    continueBtn.addEventListener('click', () => {
      const selectedIds = Array.from(document.querySelectorAll('.option-card.selected')).map(card => card.dataset.id);
      localStorage.setItem('telehealings_focus', JSON.stringify(selectedIds));
      window.location.href = 'home.html';
    });
  </script>
</body>
</html>
