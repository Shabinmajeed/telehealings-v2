<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Telehealings — Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f2f5;
    }

    /* Mobile App Container */
    .mobile-app-container {
      height: 100%;
      width: 100%;
      background-color: #ffffff;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 380px) {
      .mobile-app-container {
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
    }

    /* Animations */
    @keyframes slideFadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* Marketing Container */
    .marketing-container {
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      height: 100%;
    }

    /* Top Gradient Section */
    .top-section {
      background: linear-gradient(180deg, #e7f2ff 0%, #2366bd 100%);
      border-radius: 0 0 50% 50% / 0 0 35px 35px;
      padding: 40px 20px 25px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Logo */
    .marketing-logo-box img {
      width: 120px;
      height: auto;
      display: block;
      margin-bottom: 10px;
    }

    /* Typography */
    .marketing-title {
      color: #1e5ab8;
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      opacity: 0;
      animation: slideFadeUp 0.6s ease-out 0.1s forwards;
    }

    .marketing-subtitle {
      color: #1e5ab8;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 35px;
      text-align: center;
      opacity: 0;
      animation: slideFadeUp 0.6s ease-out 0.2s forwards;
    }

    /* Features List */
    .features-list {
      position: relative;
      margin-bottom: 40px;
      width: 100%;
      max-width: 300px;
      opacity: 0;
      animation: slideFadeUp 0.6s ease-out 0.3s forwards;
    }

    .feature-item {
      color: #1e5ab8;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 9px;
      position: relative;
      padding-left: 24px;
    }

    .feature-item:last-child {
      margin-bottom: 0;
    }

    .feature-item::before {
      content: '✦';
      position: absolute;
      left: 0;
      top: -1px;
      color: #1e5ab8;
      font-size: 16px;
    }

    /* Stats Row */
    .stats-row {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: space-between;
      max-width: 340px;
      opacity: 0;
      animation: slideFadeUp 0.6s ease-out 0.4s forwards;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      padding: 20px 12px;
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    .stat-box-value {
      color: #1e5ab8;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .stat-box-label {
      color: #55605E;
      font-size: 0.65rem;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: 0.05em;
    }

    /* Bottom Section */
    .bottom-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 25px 60px 25px;
      background-color: #ffffff;
      opacity: 0;
      animation: slideFadeUp 0.6s ease-out 0.5s forwards;
    }

    .heali-img {
      width: 90px;
      margin-top: auto;
      margin-bottom: 10px;
      animation: float 4s ease-in-out infinite;
    }

    .cta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: auto;
    }

    .cta-text {
      color: #1e5ab8;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.5px;
    }

    /* Circle Button */
    .btn-circle {
      background-color: #387bd5;
      color: #ffffff;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(56, 123, 213, 0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      flex-shrink: 0;
    }

    .btn-circle:active {
      transform: scale(0.95);
    }

    .btn-circle svg {
      width: 28px;
      height: 28px;
    }
  </style>
</head>
<body>
  <div class="mobile-app-container marketing-container">
    <!-- Top Gradient Area -->
    <div class="top-section">
      <div class="marketing-logo-box">
        <img src="../assets/logo.png" alt="Telehealings Logo" onerror="this.parentElement.innerHTML='<svg viewBox=\'0 0 48 48\' fill=\'none\' width=\'120\' height=\'auto\'><circle cx=\'24\' cy=\'24\' r=\'20\' fill=\'#2a73d4\'/><path d=\'M24 10C16.268 10 10 16.268 10 24C24 24 24 24 24 24C31.732 24 24 24 24 24C31.732 31.732 24 38 24 38C16.268 38 10 31.732 10 24\' stroke=\'white\' stroke-width=\'2.5\' stroke-linecap=\'round\'/><circle cx=\'24\' cy=\'24\' r=\'5\' fill=\'white\'/></svg>'">
      </div>

      <h1 class="marketing-title">Telehealings</h1>
      <h2 class="marketing-subtitle">Continuity-first wellness care platform</h2>

      <div class="features-list">
        <div class="feature-item">Ai-powered conversational partner</div>
        <div class="feature-item">Therapist handover continuity</div>
        <div class="feature-item">Self-help library</div>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-box-value">200+</span>
          <span class="stat-box-label">Verified<br>therapists</span>
        </div>
        <div class="stat-box">
          <span class="stat-box-value">8+</span>
          <span class="stat-box-label">Languages<br>&nbsp;</span>
        </div>
        <div class="stat-box">
          <span class="stat-box-value">1,000+</span>
          <span class="stat-box-label">Hours of<br>therapy</span>
        </div>
      </div>
    </div>

    <!-- Bottom White Area with Heali -->
    <div class="bottom-section">
      <img src="../assets/Heali.png" alt="Heali the Penguin" class="heali-img" onerror="this.style.display='none'">

      <div class="cta-row">
        <p class="cta-text">Your wellness journey<br>is one click away.</p>
        <button class="btn-circle" onclick="window.location.href='./soft-onboarding.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
</body>
</html>
